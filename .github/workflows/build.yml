name: Build Switch NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout repo (no submodule)
      uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 0

    - name: Clone borealis dependency
      run: |
        mkdir -p externals
        git clone --depth 1 --branch main https://github.com/nintendo-homebrew/borealis.git externals/borealis || \
        git clone --depth 1 --branch main https://github.com/xfangfang/borealis.git externals/borealis || \
        git clone --depth 1 https://github.com/natinus/borealis.git externals/borealis
        echo "=== borealis contents ==="
        ls externals/borealis/
        ls externals/borealis/CMakeLists.txt 2>&1 || true
        ls externals/borealis/include/borealis 2>&1 || true

    - name: Install CMake + make
      run: |
        apt-get update -qq
        apt-get install -y -qq cmake make
        cmake --version
        make --version

    - name: Configure
      run: |
        TOOLCHAIN=$(find /opt -name "devkitA64.cmake" 2>/dev/null | head -1)
        echo "Toolchain: ${TOOLCHAIN}"
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE="${TOOLCHAIN}" \
          -DCMAKE_BUILD_TYPE=Release \
          -G "Unix Makefiles"

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-pctl-gui.nro
        path: build/switch-pctl-gui.nro
