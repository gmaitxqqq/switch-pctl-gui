name: Build Switch NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: gmaitxqqq/switch-devkitpro:latest
      options: --user root

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup build environment
      run: |
        # Update package list
        apt-get update -qq
        # Ensure CMake and build tools are available
        apt-get install -y -qq cmake ninja-build python3 2>/dev/null || true
        # Show devkitPro environment
        echo "DEVKITPRO: $DEVKITPRO"
        echo "PATH: $PATH"
        ls $DEVKITPRO 2>/dev/null || echo "DEVKITPRO dir not found"
        # If using Docker image, devkitPro should already be installed
        # If not, install it
        if [ ! -d "$DEVKITPRO" ]; then
          echo "Installing devkitPro..."
          git clone https://github.com/devkitPro/devkitPro-pacman.git /tmp/dkp
          # Install devkitA64 and switch tools
          pacman -Syu --noconfirm 2>/dev/null || true
        fi

    - name: Build project
      run: |
        cd /github/workspace
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/DevkitA64Libnx.cmake \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release
        ninja -C build
      env:
        DEVKITPRO: /opt/devkitpro

    - name: List build outputs
      run: |
        echo "Build directory contents:"
        find build -type f | head -20
        echo ""
        echo "Looking for .nro file:"
        find build -name "*.nro" -o -name "*.nso" -o -name "*.npdm" 2>/dev/null

    - name: Upload NRO artifact
      uses: actions/upload-artifact@v4
      with:
        name: switch-pctl-gui-nro
        path: |
          build/switch-pctl-gui.nro
          build/switch-pctl-gui.nso
          build/switch-pctl-gui.npdm
        if-no-files-found: warn
