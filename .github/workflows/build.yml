name: Build Switch PCTL GUI NRO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install devkitPro (switch-pctltcp-allinone style)
        run: |
          # Install pacman (Arch package manager for devkitPro)
          wget https://pkg.devkitpro.org/install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman
          sudo pacman -S --noconfirm devkitA64 libnx switch-cmake
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITA64=/opt/devkitpro/devkitA64" >> $GITHUB_ENV
          echo "/opt/devkitpro/devkitA64/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/pacman/bin" >> $GITHUB_PATH

      - name: Install CMake
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build
          cmake --version

      - name: Verify devkitPro installation
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          ls $DEVKITPRO/cmake/ || echo "cmake/ dir not found"
          find $DEVKITPRO -name "*.cmake" | head -20

      - name: Initialize submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force
          ls externals/borealis/CMakeLists.txt && echo "✅ borealis found" || echo "❌ borealis missing"

      - name: Configure with CMake
        run: |
          TOOLCHAIN="$DEVKITPRO/cmake/DevkitA64Libnx.cmake"
          if [ ! -f "$TOOLCHAIN" ]; then
            # Try alternative path
            TOOLCHAIN=$(find $DEVKITPRO -name "DevkitA64Libnx.cmake" | head -1)
          fi
          echo "Using toolchain: $TOOLCHAIN"
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_MAKE_PROGRAM=ninja
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITA64: /opt/devkitpro/devkitA64

      - name: Build
        run: cmake --build build -j$(nproc)
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITA64: /opt/devkitpro/devkitA64

      - name: List build outputs
        run: find . -name "*.nro" -o -name "*.elf" | head -20

      - name: Upload NRO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: switch-pctl-gui-nro
          path: |
            build/switch-pctl-gui.nro
            **/*.nro
          if-no-files-found: warn

      - name: Create/Update Release
        if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Switch PCTL GUI (latest build)
          body: |
            # Switch 家长控制图形化管理工具 - 最新构建
            Commit: ${{ github.sha }}
            Build time: ${{ github.run_started_at }}
          files: |
            build/switch-pctl-gui.nro
            **/*.nro
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
