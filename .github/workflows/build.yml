name: Build Switch NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Download borealis (no git clone)
      run: |
        mkdir -p externals/borealis
        # Download tarball from xfangfang/borealis main branch
        curl -k -sL "https://github.com/xfangfang/borealis/archive/refs/heads/main.tar.gz" -o /tmp/borealis.tar.gz
        tar xzf /tmp/borealis.tar.gz -C /tmp/
        mv /tmp/borealis-main/* externals/borealis/
        rm -rf /tmp/borealis.tar.gz /tmp/borealis-main
        echo "=== borealis root ==="
        ls externals/borealis/
        echo "=== CMakeLists ==="
        cat externals/borealis/CMakeLists.txt | head -5 || echo "NO CMakeLists.txt"

    - name: Install CMake + make
      run: |
        apt-get update -qq
        apt-get install -y -qq cmake make
        cmake --version

    - name: Configure
      run: |
        TOOLCHAIN=$(find /opt -name "devkitA64.cmake" 2>/dev/null | head -1)
        echo "Toolchain: ${TOOLCHAIN}"
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE="${TOOLCHAIN}" \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-pctl-gui.nro
        path: build/switch-pctl-gui.nro
