name: Build Switch NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Clone borealis
      run: |
        git config --global http.sslVerify false
        rm -rf externals/borealis
        mkdir -p externals
        git clone --depth 1 https://github.com/natinus/borealis.git externals/borealis
        ls externals/borealis/CMakeLists.txt

    - name: Install CMake + make
      run: |
        apt-get update -qq
        apt-get install -y -qq cmake make
        cmake --version

    - name: Configure
      run: |
        TOOLCHAIN=$(find /opt -name "devkitA64.cmake" 2>/dev/null | head -1)
        echo "Toolchain: ${TOOLCHAIN}"
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE="${TOOLCHAIN}" \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-pctl-gui.nro
        path: build/switch-pctl-gui.nro
