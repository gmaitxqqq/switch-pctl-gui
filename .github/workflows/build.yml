name: Build Switch NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install CMake + make
      run: |
        apt-get update -qq
        apt-get install -y -qq cmake make
        cmake --version
        make --version

    - name: Show devkitPro layout
      run: |
        . /etc/profile.d/devkitpro.sh || true
        echo "DEVKITPRO=${DEVKITPRO:-/opt/devkitpro}"
        ls /opt/devkitpro/cmake/

    - name: Configure with CMake
      run: |
        . /etc/profile.d/devkitpro.sh || true
        export DEVKITPRO=/opt/devkitpro
        TOOLCHAIN=${DEVKITPRO}/cmake/devkitA64.cmake
        echo "Toolchain: ${TOOLCHAIN}"
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN} \
          -DCMAKE_BUILD_TYPE=Release \
          -G "Unix Makefiles"

    - name: Build
      run: |
        . /etc/profile.d/devkitpro.sh || true
        export DEVKITPRO=/opt/devkitpro
        cmake --build build --config Release -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-pctl-gui.nro
        path: build/switch-pctl-gui.nro
