name: Build Switch NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Debug container layout
      run: |
        echo "=== /opt ==="
        ls /opt/ || true
        echo "=== /opt/devkitpro ==="
        ls /opt/devkitpro/ || true
        echo "=== cmake dir ==="
        find /opt -name "*.cmake" 2>/dev/null | head -20 || true
        echo "=== which cmake make aarch64-none-elf-g++ ==="
        which cmake || true
        which make || true
        which aarch64-none-elf-g++ || true
        which aarch64-none-elf-gcc || true

    - name: Install CMake + make
      run: |
        apt-get update -qq
        apt-get install -y -qq cmake make
        cmake --version
        make --version

    - name: Configure
      run: |
        TOOLCHAIN=$(find /opt -name "devkitA64.cmake" 2>/dev/null | head -1)
        echo "Toolchain: ${TOOLCHAIN:-NOT FOUND}"
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN} \
          -DCMAKE_BUILD_TYPE=Release \
          -G "Unix Makefiles"

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-pctl-gui.nro
        path: build/switch-pctl-gui.nro
