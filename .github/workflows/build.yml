name: Build Switch NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    env:
      DEVKITPRO: /opt/devkitpro

    steps:
    - name: Checkout project
      uses: actions/checkout@v4

    - name: Checkout borealis (wiliwili branch, with submodules)
      uses: actions/checkout@v4
      with:
        repository: xfangfang/borealis
        ref: wiliwili
        path: externals/borealis
        submodules: recursive

    - name: Verify dependencies
      run: |
        echo "=== borealis ==="
        ls externals/borealis/CMakeLists.txt && echo "OK: borealis top-level"
        ls externals/borealis/library/CMakeLists.txt && echo "OK: borealis library"
        ls externals/borealis/library/cmake/commonOption.cmake && echo "OK: commonOption"
        ls externals/borealis/library/cmake/toolchain.cmake && echo "OK: toolchain"
        echo "=== Switch.cmake ==="
        ls /opt/devkitpro/cmake/Switch.cmake && echo "OK: Switch.cmake"
        echo "=== icon ==="
        ls icon.jpg && echo "OK: icon.jpg"

    - name: Install CMake + make
      run: |
        apt-get update -qq
        apt-get install -y -qq cmake make
        cmake --version

    - name: Configure
      run: cmake -B build -DPLATFORM_SWITCH=ON -DFMT_OS=OFF

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Verify NRO
      run: |
        ls build/switch-pctl-gui.nro && echo "NRO built successfully"
        ls build/switch-pctl-gui.elf && echo "ELF built successfully"

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-pctl-gui.nro
        path: build/switch-pctl-gui.nro
