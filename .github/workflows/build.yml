name: Build Switch NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    env:
      DEVKITPRO: /opt/devkitpro

    steps:
    - name: Checkout project
      uses: actions/checkout@v4

    - name: Checkout borealis (wiliwili branch)
      uses: actions/checkout@v4
      with:
        repository: xfangfang/borealis
        ref: wiliwili
        path: externals/borealis
        submodules: recursive

    - name: Verify borealis
      run: ls externals/borealis/CMakeLists.txt && echo "borealis OK"

    - name: Install CMake + make
      run: |
        apt-get update -qq
        apt-get install -y -qq cmake make
        cmake --version

    - name: Configure
      run: |
        TOOLCHAIN=$(find /opt -name "devkitA64.cmake" 2>/dev/null | head -1)
        echo "Toolchain: ${TOOLCHAIN}"
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE="${TOOLCHAIN}" \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-pctl-gui.nro
        path: build/switch-pctl-gui.nro
