name: Build Switch NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install CMake
      run: |
        apt-get update -qq
        apt-get install -y -qq cmake jq git
        cmake --version

    - name: Show devkitPro env
      run: |
        cat /etc/profile.d/devkitpro.sh || true
        echo "DEVKITPRO=$DEVKITPRO"
        ls /opt/devkitpro/cmake/ || true

    - name: Configure with CMake
      run: |
        source /etc/profile.d/devkitpro.sh || true
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=/opt/devkitpro/devkitARM
        export DEVKITAPPCAFE=/opt/devkitpro/devkitA64
        echo "DEVKITPRO=${DEVKITPRO}"
        ls ${DEVKITPRO}/cmake/ || true
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=${DEVKITPRO}/cmake/DevkitA64Libnx.cmake \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        source /etc/profile.d/devkitpro.sh || true
        export DEVKITPRO=/opt/devkitpro
        cmake --build build --config Release -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-pctl-gui.nro
        path: build/switch-pctl-gui.nro
