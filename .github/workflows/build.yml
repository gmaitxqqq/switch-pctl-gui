name: Build Switch NRO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Ensure borealis submodule
      run: |
        git submodule sync --recursive
        git submodule update --init --recursive
        ls externals/borealis/CMakeLists.txt || echo "WARNING: borealis still missing"

    - name: Install CMake + make
      run: |
        apt-get update -qq
        apt-get install -y -qq cmake make
        cmake --version
        make --version

    - name: Find toolchain
      run: |
        TOOLCHAIN=$(find /opt -name "devkitA64.cmake" -o -name "DevkitA64Libnx.cmake" 2>/dev/null | head -1)
        echo "TOOLCHAIN=${TOOLCHAIN}" >> $GITHUB_ENV
        echo "Found toolchain: ${TOOLCHAIN}"

    - name: Configure
      run: |
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN }}" \
          -DCMAKE_BUILD_TYPE=Release \
          -G "Unix Makefiles"

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Upload NRO
      uses: actions/upload-artifact@v4
      with:
        name: switch-pctl-gui.nro
        path: build/switch-pctl-gui.nro
